# The timeline flow: tap a fun-fact chip, land in the story.
# jumpToPart drives FlatList.scrollToIndex against an index computed
# in buildGazetteerRows — every new row type can silently drift it.
# This catches dead taps and scroll crashes; exact part-targeting is
# pinned by unit tests (the chip's target index), not E2E.
appId: com.eddtb.landmarks
---
- launchApp
- runFlow: subflows/setup.yaml

- runFlow: subflows/open-history-tab.yaml
- extendedWaitUntil:
    visible:
      id: 'timeline-stop'
    timeout: 45000

# Tap the first chip — the one that always exists
- tapOn:
    id: 'timeline-stop'
    index: 0
- extendedWaitUntil:
    visible:
      id: 'part-eyebrow'
    timeout: 10000
