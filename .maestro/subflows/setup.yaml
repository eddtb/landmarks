# Shared setup: every flow runs this right after launchApp.
#
# Since the one-door pivot there is no first-run overlay to dismiss —
# a fresh install with auto-granted location boots straight to the
# feed, and the one door itself only exists while location permission
# is UNDETERMINED (which Maestro's permission model never produces).
# What remains here are the boot guards; this file stays as the one
# seam every flow already consumes, so any future first-run handling
# lands in one place.
appId: com.eddtb.landmarks
---
- runFlow: boot.yaml
