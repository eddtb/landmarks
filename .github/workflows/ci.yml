name: CI

on:
  push:
    branches: [main]
  pull_request:
  # The merge queue tests PRs on temporary branches that emit
  # merge_group events — a required check that never runs there
  # would block the queue forever
  merge_group:
  # The merge chain updates branches with GITHUB_TOKEN, whose pushes
  # trigger no workflows (anti-recursion) — so it dispatches CI here
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Typecheck, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # expo-env.d.ts and .expo/types are gitignored; regenerate them for typecheck
      - name: Generate Expo types
        run: npx expo customize tsconfig.json

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Test
        run: npm test -- --ci --coverage --coverageReporters=text --coverageReporters=text-summary | tee test-output.txt

      # Coverage is VISIBILITY, never a gate — a threshold would teach
      # us to write assertion-free tests that execute lines (Goodhart)
      - name: Publish coverage to the job summary
        if: always()
        run: |
          {
            echo '## Coverage'
            echo '```'
            sed -n '/^=* Coverage summary/,/^=*$/p' test-output.txt
            echo '```'
            echo '<details><summary>Per-file table</summary>'
            echo ''
            echo '```'
            grep '|' test-output.txt | head -100
            echo '```'
            echo '</details>'
          } >> "$GITHUB_STEP_SUMMARY"
