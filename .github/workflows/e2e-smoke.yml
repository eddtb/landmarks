# The E2E smoke: does the app actually run, end to end, through the UI?
#
# Nightly + on-demand, deliberately NOT per-PR: this is a ~25-minute
# macOS job (free on a public repo, but slow), and the per-PR gate is
# unit tests + typecheck + review. Maestro drives the same topology we
# verify locally — dev build + Metro with REPLAY_ONLY=1 — because the
# API routes have no production origin; REPLAY_ONLY guarantees no AI
# call can bill from CI (it refuses even free ones). E2E_FIXTURES=1
# makes the run hermetic: Wikipedia/Wikidata rate-limit GitHub's
# shared runner IPs (run 6: batch query 429 → history 502 → no cards),
# so the API routes serve the committed Greenwich payloads in
# e2e-fixtures/ instead of calling upstreams at all.
name: E2E smoke (Maestro)

on:
  schedule:
    - cron: '30 5 * * *' # nightly, 05:30 UTC
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # The runner defaults to an older Xcode; SDK 56 needs the iOS 26
      # toolchain. Exit 65 with "0 error(s)" is this mismatch's tell.
      - name: Select the newest Xcode on the image
        run: |
          ls -d /Applications/Xcode*.app
          NEWEST="$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          sudo xcode-select -s "$NEWEST"
          xcodebuild -version

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Metro comes up FIRST: run 4 built clean in 25 minutes, then
      # died at the final step — expo run:ios auto-opens the app
      # pointed at Metro, which didn't exist yet (exit 60, timeout)
      - name: Start Metro (replay-only + fixtures — hermetic, nothing bills)
        run: |
          REPLAY_ONLY=1 E2E_FIXTURES=1 npx expo start --port 8081 &> metro.log &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://localhost:8081/status && exit 0
            sleep 2
          done
          echo "Metro never came up" >&2
          tail -50 metro.log >&2
          exit 1

      # Metro's first bundle on a cold runner takes minutes — run 3
      # died on the splash at "Bundling 52%" while the flow's timeout
      # expired. Bundle BEFORE the flow starts so its waits measure
      # the app, not the bundler. (It also warms while xcodebuild runs.)
      - name: Pre-warm the JS bundle
        run: |
          time curl -sf -o /dev/null --max-time 600 \
            "http://localhost:8081/node_modules/expo-router/entry.bundle?platform=ios&dev=true"

      - name: Build and install the dev app on a simulator
        run: npx expo run:ios --no-bundler

      - name: Pin the simulator to Greenwich and grant location
        run: |
          xcrun simctl location booted set 51.4826,-0.0077
          # Without this the app boots into the permission prompt and
          # nothing renders (first CI run's failure mode)
          xcrun simctl privacy booted grant location com.eddtb.landmarks
          # A fresh install shows the dev menu's one-time onboarding
          # sheet over the whole app (run 7: everything rendered, the
          # welcome mat blocked the assertion) — mark it already seen
          xcrun simctl spawn booted defaults write com.eddtb.landmarks EXDevMenuIsOnboardingFinished -bool true

      # The whole suite, one Maestro invocation (the flows share the
      # 25-minute build — separate steps would only add teardown).
      # Every flow runs subflows/setup.yaml (the shared boot guards)
      # first and .maestro/config.yaml pins the order. There is no
      # first-run overlay any more: the one door only exists while
      # location permission is undetermined, and this job grants it
      # above — a fresh install boots straight to the feed. The
      # denied-state fallback is driven by one-door.yaml.
      # METRO_URL rides in via -e (URL-encoded origin for the
      # dev-client relink after one-door's clearState); local
      # worktree runs pass their own port via scripts/e2e-local.sh.
      - name: Run the E2E suite
        run: maestro test --debug-output e2e-debug -e METRO_URL=http%3A%2F%2Flocalhost%3A8081 .maestro/

      - name: Capture the simulator screen on failure
        if: failure()
        run: xcrun simctl io booted screenshot sim-at-failure.png || true

      - name: Keep the evidence when it fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-debug
          path: |
            e2e-debug
            metro.log
            sim-at-failure.png
          retention-days: 14
