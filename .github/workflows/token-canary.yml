# The review robot's heartbeat.
#
# claude-review authenticates with a long-lived OAuth token
# (CLAUDE_CODE_OAUTH_TOKEN) that expires by design. When it died on
# 2026-07-21 we found out the worst way: every review failing in ~30s
# and a jammed merge queue. This canary exercises the same secret with
# a trivial call every Monday; the first week it fails, it opens ONE
# issue pointing at the runbook (scripts/rotate-review-token.sh) —
# turning the next expiry into a calendar reminder instead of an outage.
name: Review-token canary

on:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - name: Exercise the review token
        id: probe
        continue-on-error: true
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "Reply with exactly: TOKEN-ALIVE" | grep -q "TOKEN-ALIVE"

      - name: Exercise the chain token
        id: chainprobe
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.CHAIN_TOKEN }}
        run: |
          # The merge chain's PAT expires like any credential — verify
          # it still authenticates AND still sees this repo with push
          gh api "repos/$GITHUB_REPOSITORY" --jq '.permissions.push' | grep -q true

      - name: Sound the alarm (one open issue, no duplicates)
        if: steps.probe.outcome == 'failure' || steps.chainprobe.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          open_count=$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --label token-canary --state open --json number --jq length)
          if [ "$open_count" = "0" ]; then
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --label token-canary \
              --title "A robot token is failing its canary — rotate it" \
              --body "$(printf 'The weekly canary failed — check the run to see WHICH token:\n\n- **Review token** (CLAUDE_CODE_OAUTH_TOKEN): until rotated, every claude-review fails in ~30s. Fix: run scripts/rotate-review-token.sh and approve the browser prompt — it live-tests before storing and re-fires the failed review.\n- **Chain token** (CHAIN_TOKEN): until rotated, the merge chain produces check-less branch updates and armed PRs stall. Fix: mint a fine-grained PAT (this repo only, Contents + Pull requests read/write) and run: gh secret set CHAIN_TOKEN.\n\nCanary run: %s/%s/actions/runs/%s' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
          fi

      - name: Fail the run when the token is dead
        if: steps.probe.outcome == 'failure' || steps.chainprobe.outcome == 'failure'
        run: exit 1
